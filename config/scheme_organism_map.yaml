# scheme_organism_map.yaml
#
# Maps a PubMLST scheme name (as `mlst` reports it in the SCHEME column / JSON
# `scheme` field) to an AMRFinderPlus `--organism` token. amr_plus_gui reads
# `organism_token` out of mlst_result.json to corroborate Kraken's organism
# call and to pick the right AMRFinderPlus organism for point-mutation
# screening.
#
# Notes:
#  - Keys are matched case-insensitively after stripping a trailing numeric
#    variant suffix where the variant maps to the same organism (e.g.
#    `abaumannii_2` -> `abaumannii`); the loader also tries the exact key first.
#  - `species_guess` (a human-readable label) is derived from the token by the
#    pipeline; this file only needs the token.
#  - AMRFinderPlus accepts only a fixed list of `--organism` values. Schemes
#    that have no matching AMRFinderPlus organism are intentionally left out
#    (they resolve to an empty token, and amr_plus_gui then runs AMRFinderPlus
#    without `--organism`). See `amrfinder --list_organisms` for the canonical
#    list.

# --- Acinetobacter ---
abaumannii: Acinetobacter_baumannii
abaumannii_2: Acinetobacter_baumannii

# --- Burkholderia ---
bcc: Burkholderia_cepacia
bpseudomallei: Burkholderia_pseudomallei

# --- Campylobacter ---
